spring.application.name=usuario

# ==========================================
# Configuracion servidor
# ==========================================
server.port=8082

# ==========================================
# Base de datos MySQL
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/db_usuario?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA — Liquibase gestiona el schema, JPA solo valida
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# Liquibase (migraciones de base de datos)
# ==========================================
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# ==========================================
# URLs de otros microservicios
# Cambiar por IP privada/publica en produccion
# ==========================================
pedidos.api.base-url=http://localhost:8081/api/v1/orders
inventario.api.base-url=http://localhost:9090/api/v1/products

# ==========================================
# Swagger UI
# ==========================================
springdoc.swagger-ui.path=/swagger-ui.html
